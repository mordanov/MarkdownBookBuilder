repos:
  - repo: local
    hooks:
      - id: ruff
        name: "Ruff: Lint and fix Python code"
        entry: ruff check --fix
        language: system
        types: [python]
      - id: ruff-format
        name: "Ruff: Format Python code"
        entry: ruff format
        language: system
        types: [python]
      - id: trailing-whitespace
        name: "Trim trailing whitespace"
        entry: sed -i '' 's/[[:space:]]*$//g'
        language: system
        types: [text]
      - id: end-of-file-fixer
        name: "Fix end of file"
        entry: sh -c 'for file in "$@"; do tail -c 1 "$file" | od -An -tx1 | grep -q "0a" || echo >> "$file"; done'
        language: system
        types: [text]
