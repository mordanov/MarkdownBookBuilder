repos:
  - repo: local
    hooks:
      - id: ruff-lint
        name: "Ruff: Lint and fix"
        entry: ruff check --fix
        language: system
        types: [python]

      - id: ruff-format
        name: "Ruff: Format"
        entry: ruff format
        language: system
        types: [python]

      - id: mypy
        name: "mypy: Type check"
        entry: mypy src/
        language: system
        types: [python]
        pass_filenames: false
        args: [--config-file=pyproject.toml]

      - id: check-yaml
        name: "Check YAML syntax"
        entry: python -c "import sys, yaml; [yaml.safe_load(open(f)) for f in sys.argv[1:]]"
        language: system
        types: [yaml]

      - id: check-merge-conflict
        name: "Check for merge conflict markers"
        entry: bash -c 'grep -rl "^<<<<<<< " --include="*.py" --include="*.md" --include="*.toml" --include="*.yaml" . 2>/dev/null && exit 1 || exit 0'
        language: system
        pass_filenames: false

      - id: check-large-files
        name: "Check for large files (>500KB)"
        entry: >-
          bash -c
          'git diff --cached --name-only |
          while read f; do
          [ -f "$f" ] && size=$(wc -c < "$f") &&
          [ "$size" -gt 512000 ] && echo "Too large: $f" && exit 1;
          done; exit 0'
        language: system
        pass_filenames: false
